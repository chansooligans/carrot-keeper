<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="theme-color" content="#0f380f">
  <title>Carrot Keeper</title>
  <style>
    :root {
      --bg: #0f380f;
      --frame: #1a1a1a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      width: 100%;
      background: var(--frame);
      color: #d6e0a8;
      font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }
    #game-frame {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    canvas#game {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      background: #0f380f;
      width: 640px;
      height: 576px;
      display: block;
      border: 4px solid #2a2a2a;
      border-radius: 6px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    }
    /* Cover-art overlay shown during the title sequence — replaced by canvas after start */
    #cover-stack {
      position: relative;
      width: 640px;
      height: 576px;
    }
    #cover-stack canvas { position: absolute; top: 0; left: 0; }
    #cover-art {
      position: absolute;
      top: 4px; left: 4px;
      width: 632px;
      height: 568px;
      object-fit: cover;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.4s ease-in;
      border-radius: 4px;
      z-index: 2;
    }
    #cover-art.visible { opacity: 1; }
    #cover-art.fading  { opacity: 0; transition: opacity 0.6s ease-out; }
    #cover-prompt {
      position: absolute;
      bottom: 18px;
      left: 0; right: 0;
      text-align: center;
      color: #2b1c0a;
      font-family: ui-monospace, monospace;
      font-weight: bold;
      letter-spacing: 0.2em;
      text-shadow: 0 0 8px #f4dd80, 0 0 14px #f4dd80;
      z-index: 3;
      pointer-events: none;
      opacity: 0;
    }
    #cover-prompt.visible { opacity: 1; animation: blink 1s infinite step-end; }
    @keyframes blink { 50% { opacity: 0.3; } }
    @media (max-width: 700px) {
      canvas#game,
      #cover-stack { width: 95vw; height: calc(95vw * 0.9); max-height: 65vh; }
      #cover-art { width: calc(100% - 8px); height: calc(100% - 8px); }
    }
    #footer {
      font-size: 11px;
      opacity: 0.6;
      padding: 4px 8px;
      letter-spacing: 0.05em;
    }
    /* Mobile dpad */
    #dpad {
      display: none;
      position: relative;
      width: 100%;
      max-width: 640px;
      justify-content: space-between;
      padding: 0 16px;
      align-items: center;
    }
    @media (hover: none) and (pointer: coarse) {
      #dpad { display: flex; }
    }
    #dpad-left {
      position: relative;
      width: 144px;
      height: 144px;
    }
    #dpad-left button {
      position: absolute;
      width: 48px;
      height: 48px;
      background: #2a2a2a;
      color: #d6e0a8;
      border: 2px solid #444;
      border-radius: 8px;
      font-size: 20px;
      font-family: inherit;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #dpad-left button:active { background: #444; }
    #btn-up    { left: 48px; top: 0; }
    #btn-down  { left: 48px; top: 96px; }
    #btn-left  { left: 0;  top: 48px; }
    #btn-right { left: 96px; top: 48px; }

    #dpad-right {
      display: flex;
      gap: 12px;
    }
    #dpad-right button {
      width: 56px;
      height: 56px;
      background: #6e2222;
      color: #fff;
      border: 2px solid #441010;
      border-radius: 50%;
      font-size: 16px;
      font-family: inherit;
      font-weight: bold;
      cursor: pointer;
    }
    #dpad-right button:active { background: #8a3030; }
    #btn-b { background: #224a6e; border-color: #102844; }
    #btn-b:active { background: #3060a0; }
  </style>
</head>
<body>
  <div id="game-frame">
    <div id="cover-stack">
      <canvas id="game" width="160" height="144"></canvas>
      <img id="cover-art" src="./assets/cover.png" alt="">
      <div id="cover-prompt">PRESS Z TO BEGIN</div>
    </div>
    <div id="footer">CARROT KEEPER · CH.1 · Z=action  X=cancel  arrows=move  M=mute</div>
  </div>
  <div id="dpad">
    <div id="dpad-left">
      <button id="btn-up" data-key="ArrowUp">▲</button>
      <button id="btn-down" data-key="ArrowDown">▼</button>
      <button id="btn-left" data-key="ArrowLeft">◀</button>
      <button id="btn-right" data-key="ArrowRight">▶</button>
    </div>
    <div id="dpad-right">
      <button id="btn-a" data-key="z">A</button>
      <button id="btn-b" data-key="x">B</button>
    </div>
  </div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
